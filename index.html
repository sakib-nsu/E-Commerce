<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-commerce</title>
    <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            display: ['Playfair Display', 'serif'],
            body: ['Outfit', 'sans-serif'],
          },
          keyframes: {
            fadeUp:   { '0%': { opacity: '0', transform: 'translateY(20px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
            fadeIn:   { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
            slideIn:  { '0%': { transform: 'translateX(100%)' }, '100%': { transform: 'translateX(0)' } },
            pop:      { '0%': { transform: 'scale(0.85)', opacity: '0' }, '60%': { transform: 'scale(1.06)' }, '100%': { transform: 'scale(1)', opacity: '1' } },
            wiggle:   { '0%,100%': { transform: 'rotate(-6deg) scale(1.1)' }, '50%': { transform: 'rotate(6deg) scale(1.1)' } },
            shimmer:  { '0%': { backgroundPosition: '-200% 0' }, '100%': { backgroundPosition: '200% 0' } },
            countPop: { '0%': { transform: 'scale(1)' }, '50%': { transform: 'scale(1.5)' }, '100%': { transform: 'scale(1)' } },
          },
          animation: {
            fadeUp:   'fadeUp 0.5s ease forwards',
            fadeIn:   'fadeIn 0.3s ease forwards',
            slideIn:  'slideIn 0.35s cubic-bezier(.4,0,.2,1) forwards',
            pop:      'pop 0.35s cubic-bezier(.36,.07,.19,.97) forwards',
            wiggle:   'wiggle 0.4s ease',
            shimmer:  'shimmer 2s linear infinite',
            countPop: 'countPop 0.3s ease',
          },
        }
      }
    }
  </script>
</head>
<body>
    <p>sakib
    </p>
    
</body>
</html>
